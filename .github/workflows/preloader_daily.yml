name: Daily Preloader

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily (07:00 WAT)
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  preload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run preloader
        env:
          API_SPORTS_KEY:      ${{ secrets.API_SPORTS_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_PATH:             predictions.db
        run: python preloader.py run

      - name: Commit updated DB
        run: |
          git config user.name  "sports-engine-bot"
          git config user.email "bot@sports-engine"
          git add predictions.db
          git diff --staged --quiet || git commit -m "Preload cache: $(date -u '+%Y-%m-%d') UTC"
          git push
          
