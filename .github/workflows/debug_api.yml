name: Debug API

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx python-dotenv

      - name: Run API debug
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: python debug_api.py
        
